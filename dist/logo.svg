<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <!-- Background icon shape -->
  <rect x="10" y="10" width="80" height="80" rx="24" fill="url(#grad)" />
  <!-- Compression layers/lens effect -->
  <rect x="26" y="26" width="38" height="38" rx="8" fill="none" stroke="#ffffff" stroke-width="6.5" stroke-opacity="0.95" />
  <rect x="36" y="36" width="38" height="38" rx="8" fill="none" stroke="#ffffff" stroke-width="5" stroke-dasharray="6 3" stroke-opacity="0.6" />
  <!-- Core indicator -->
  <circle cx="45" cy="45" r="5.5" fill="#ffffff" />
  <!-- Shrink/compression dynamic arrows -->
  <path d="M 72 28 L 60 40 M 60 40 L 66 40 M 60 40 L 60 34" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
</svg>
